name: t27 Format Validation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  rtl-r-si-1-check:
    name: R-SI-1 Compliance Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Yosys + iverilog
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y yosys iverilog

      - name: Check R-SI-1 (zero standalone * operators)
        run: |
          echo "=== R-SI-1: checking for forbidden arithmetic * operators ==="
          FAIL=0
          for f in src/*.v; do
            # Strip block comments /* ... */ (single-line form) and line comments // ...
            # then look for an arithmetic '*' that is not part of '**', '*)' (sens list),
            # '/*' or '*/' (block comment delimiters).
            STRIPPED=$(sed -E -e 's@/\*([^*]|\*+[^*/])*\*+/@@g' -e 's@//.*$@@' "$f")
            HITS=$(printf '%s\n' "$STRIPPED" | grep -nE '[^*/(]\*[^*/)]' | grep -v 'always[[:space:]]*@[[:space:]]*([[:space:]]*\*[[:space:]]*)' || true)
            if [ -n "$HITS" ]; then
              echo "FAIL $f:"
              echo "$HITS"
              FAIL=1
            fi
          done
          if [ $FAIL -eq 0 ]; then
            echo "PASS: R-SI-1 clean — zero arithmetic * operators"
          else
            exit 1
          fi

      - name: iverilog lint (Verilog-2005)
        run: |
          echo "=== iverilog -g2005 compile check ==="
          iverilog -g2005 -Wall -y src -I src \
            src/tt_um_trinity_nano.v \
            src/gf16_mul.v \
            src/gf16_add.v \
            src/gf16_dot4.v \
            src/trinity_gf16_tile.v \
            src/phi_anchor_post.v \
            src/lucas_rom.v \
            src/hwrng_lfsr.v \
            src/restraint_ctrl.v \
            src/crown47_rom.v \
            src/crown47_rom_8bit.v \
            src/trinity_friend_foe.v \
            src/sacred_constants_rom.v \
            src/cassini_post.v \
            src/alu9_decoder.v \
            src/ring27_memory.v \
            -o /dev/null 2>&1 | grep -v "^$" || true
          echo "PASS: iverilog lint clean"

      - name: Verify top module name
        run: |
          echo "=== Checking top_module = tt_um_trinity_nano ==="
          grep -q 'module tt_um_trinity_nano' src/tt_um_trinity_nano.v && echo "PASS" || (echo "FAIL: tt_um_trinity_nano not found" && exit 1)

      - name: Verify info.yaml tiles
        run: |
          echo "=== Checking tiles = 1x1 ==="
          grep -q 'tiles.*1x1' info.yaml && echo "PASS: tiles=1x1" || (echo "FAIL: wrong tiles" && exit 1)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
