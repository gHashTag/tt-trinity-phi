name: RTL & Cocotb Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  iverilog-canonical:
    name: IVerilog canonical anchor test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install IVerilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Create and run canonical test
        run: |
          cat > test_canonical.v << 'TESTEOF'
          `timescale 1ns/1ps
          module tb_canonical;
              reg clk = 0;
              reg rst_n = 0;
              reg ena = 1;
              reg [7:0] ui_in = 0;
              reg [7:0] uio_in = 0;
              wire [7:0] uo_out;
              wire [7:0] uio_out;
              wire [7:0] uio_oe;

              tt_um_trinity_nano dut (.*);

              always #10 clk = ~clk;

              wire [15:0] result = {uio_out, uo_out};

              initial begin
                  $dumpfile("tb_canonical.vcd");
                  $dumpvars(0, tb_canonical);

                  rst_n = 0;
                  #100;
                  rst_n = 1;
                  #20;

                  if (result != 16'h47C0) $error("[T1] FAIL expected 0x47C0 got 0x%04h", result);
                  if (uio_oe != 8'hFF) $error("[T2] FAIL uio_oe = 0x%02h", uio_oe);

                  $finish;
              end
          endmodule
          TESTEOF
          iverilog -o test_canonical.out -Isrc src/*.v test_canonical.v
          vvp test_canonical.out

  cocotb-rtl:
    name: Cocotb RTL tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Cocotb + IVerilog
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-venv iverilog
          pip3 install --break-system-packages cocotb

      - name: Run Cocotb tests
        run: |
          cd test
          make SIM=icarus

  yosys-rsi1-audit:
    name: R-SI-1 audit (Yosys)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Yosys
        run: sudo apt-get update && sudo apt-get install -y yosys

      - name: Run Yosys R-SI-1 audit
        run: |
          yosys -p "read_verilog -I src src/*.v; \
                    hierarchy -top tt_um_trinity_nano; \
                    proc; opt; stat" | grep '\$mul' || echo "No multipliers found (R-SI-1 compliant)"